name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg17@sha256:d2ef61f42ef767baa5a1475393303cc235bcd92febd9d7014eddb48b41f3bad0
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: go.mod
          cache: true
      - uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: web/dashboard/package-lock.json
      - run: npm ci
        working-directory: web/dashboard
      - name: Initialize isolated control and knowledge databases
        run: ./scripts/init-postgres.sh
      - run: ./scripts/embed-dashboard-docs.sh
      - run: npm run generate:api && npm test && npm run build
        working-directory: web/dashboard
      - run: npx playwright install --with-deps chromium
        working-directory: web/dashboard
      - run: npm run test:e2e
        working-directory: web/dashboard
      - run: ./scripts/check-dashboard-assets.sh
      - name: Verify generated dashboard is reproducible
        run: git diff --exit-code -- internal/dashboard/assets internal/dashboard/docs web/dashboard/src/generated/api.ts
      - run: ./scripts/lint-arch.sh
      - run: go test ./...
        env:
          TEST_POSTGRES_ADMIN_URL: postgres://postgres:postgres@127.0.0.1:5432/postgres?sslmode=disable
          TEST_POSTGRES_URL: postgres://vessica_control_user:vessica_control_dev@127.0.0.1:5432/vessica_control?sslmode=disable
      - run: go test -race ./internal/state ./internal/app ./internal/run ./internal/controlplane
        env:
          TEST_POSTGRES_URL: postgres://vessica_control_user:vessica_control_dev@127.0.0.1:5432/vessica_control?sslmode=disable
      - run: go vet ./...
      - run: go run golang.org/x/vuln/cmd/govulncheck@v1.6.0 ./...
      - run: go build ./cmd/ves
