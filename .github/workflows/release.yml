name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: web/dashboard/package-lock.json
      - name: Build embedded dashboard
        run: |
          ./scripts/embed-dashboard-docs.sh
          cd web/dashboard
          npm ci
          npm run generate:api
          npm run build
          cd ../..
          ./scripts/check-dashboard-assets.sh
      - name: Build release archives
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          version="${VERSION#v}"
          mkdir -p dist

          for target in \
            linux/amd64 \
            linux/arm64 \
            darwin/amd64 \
            darwin/arm64 \
            windows/amd64
          do
            goos="${target%/*}"
            goarch="${target#*/}"
            name="vessica-cli_${version}_${goos}_${goarch}"
            binary="ves"
            if [ "$goos" = "windows" ]; then
              binary="ves.exe"
            fi

            mkdir -p "dist/$name"
            CGO_ENABLED=0 GOOS="$goos" GOARCH="$goarch" go build \
              -trimpath \
              -ldflags "-s -w -X github.com/vessica-labs/vessica-cli/internal/version.Version=$version" \
              -o "dist/$name/$binary" \
              ./cmd/ves
            cp LICENSE README.md "dist/$name/"

            if [ "$goos" = "windows" ]; then
              (cd dist && zip -qr "$name.zip" "$name")
            else
              tar -C dist -czf "dist/$name.tar.gz" "$name"
            fi
            rm -rf "dist/$name"
          done

          (cd dist && sha256sum ./*.tar.gz ./*.zip > checksums.txt)
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" dist/* \
            --repo "$GITHUB_REPOSITORY" \
            --title "Vessica CLI $GITHUB_REF_NAME" \
            --generate-notes \
            --verify-tag

  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Resolve version
        id: version
        shell: bash
        run: echo "value=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
      - uses: docker/setup-qemu-action@v4
      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}
      - name: Build and publish package
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          build-args: |
            VERSION=${{ steps.version.outputs.value }}
          tags: |
            ghcr.io/${{ github.repository }}:${{ steps.version.outputs.value }}
            ghcr.io/${{ github.repository }}:latest
          labels: |
            org.opencontainers.image.title=Vessica CLI
            org.opencontainers.image.description=Local-first engineering control plane for coding agents
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.version=${{ steps.version.outputs.value }}
            org.opencontainers.image.licenses=Apache-2.0
      - name: Make package public
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          for attempt in $(seq 1 12); do
            if gh api --method PATCH \
              "/orgs/${GITHUB_REPOSITORY_OWNER}/packages/container/vessica-cli" \
              -f visibility=public; then
              exit 0
            fi
            sleep 5
          done
          exit 1
