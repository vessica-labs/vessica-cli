name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write

jobs:
  release-assets:
    name: Build release assets
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Verify tag matches repository version
        shell: bash
        run: test "$(cat VERSION)" = "${GITHUB_REF_NAME#v}"
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: go.mod
          cache: true
      - uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: web/dashboard/package-lock.json
      - name: Build embedded dashboard
        run: |
          ./scripts/embed-dashboard-docs.sh
          cd web/dashboard
          npm ci
          npm run generate:api
          npm run build
          cd ../..
          ./scripts/check-dashboard-assets.sh
      - name: Build release archives
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          version="${VERSION#v}"
          mkdir -p dist

          for target in \
            linux/amd64 \
            linux/arm64 \
            darwin/amd64 \
            darwin/arm64 \
            windows/amd64
          do
            goos="${target%/*}"
            goarch="${target#*/}"
            name="vessica-cli_${version}_${goos}_${goarch}"
            binary="ves"
            if [ "$goos" = "windows" ]; then
              binary="ves.exe"
            fi

            mkdir -p "dist/$name"
            CGO_ENABLED=0 GOOS="$goos" GOARCH="$goarch" go build \
              -trimpath \
              -ldflags "-s -w -X github.com/vessica-labs/vessica-cli/internal/version.Version=$version" \
              -o "dist/$name/$binary" \
              ./cmd/ves
            cp LICENSE README.md "dist/$name/"

            if [ "$goos" = "windows" ]; then
              (cd dist && zip -qr "$name.zip" "$name")
            else
              tar -C dist -czf "dist/$name.tar.gz" "$name"
            fi
            rm -rf "dist/$name"
          done

          plugin_stage="$(mktemp -d)"
          cp -R internal/codexplugin/assets/. "$plugin_stage/"
          printf '%s\n' "$version" > "$plugin_stage/scripts/cli-version.txt"
          python3 - "$plugin_stage/.codex-plugin/plugin.json" "$version+codex.${GITHUB_RUN_ID}" <<'PY'
          import json
          import pathlib
          import sys

          path = pathlib.Path(sys.argv[1])
          manifest = json.loads(path.read_text())
          manifest["version"] = sys.argv[2]
          path.write_text(json.dumps(manifest, indent=2) + "\n")
          PY
          chmod 0755 "$plugin_stage/scripts/"*.sh
          tar -C "$plugin_stage" -czf "dist/vessica-codex-plugin_${version}.tar.gz" .
          rm -rf "$plugin_stage"
          (cd dist && sha256sum ./*.tar.gz ./*.zip > checksums.txt)
          test "$(tar -xOf "dist/vessica-codex-plugin_${version}.tar.gz" ./scripts/cli-version.txt)" = "$version"
          test "$(tar -xOf "dist/vessica-codex-plugin_${version}.tar.gz" ./.codex-plugin/plugin.json | jq -r .version)" = "$version+codex.${GITHUB_RUN_ID}"
          tar -xOf "dist/vessica-codex-plugin_${version}.tar.gz" ./scripts/ensure-ves.sh | grep -F '$base/checksums.txt'
          tar -tvf "dist/vessica-codex-plugin_${version}.tar.gz" ./scripts/ensure-ves.sh | grep -E '^-rwxr-xr-x'
          cat > dist/compatibility.json <<EOF
          {
            "schema": "vessica.release/v1",
            "cli": "$version",
            "control_plane_image": "ghcr.io/${GITHUB_REPOSITORY}:$version",
            "knowledge_server_image": "ghcr.io/vessica-labs/vessica-knowledge-server:v0.4.0"
          }
          EOF
      - name: Create draft GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" dist/* \
            --repo "$GITHUB_REPOSITORY" \
            --title "Vessica CLI $GITHUB_REF_NAME" \
            --generate-notes \
            --draft \
            --verify-tag

  package-build:
    name: Package (${{ matrix.arch }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-latest
          - arch: arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Verify tag matches repository version
        shell: bash
        run: test "$(cat VERSION)" = "${GITHUB_REF_NAME#v}"
      - name: Resolve version
        id: version
        shell: bash
        run: echo "value=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4
      - uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}
      - name: Build and publish native package
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        with:
          context: .
          push: true
          platforms: linux/${{ matrix.arch }}
          provenance: mode=max
          sbom: true
          build-args: |
            VERSION=${{ steps.version.outputs.value }}
          tags: |
            ghcr.io/${{ github.repository }}:${{ steps.version.outputs.value }}-${{ matrix.arch }}
          labels: |
            org.opencontainers.image.title=Vessica CLI
            org.opencontainers.image.description=Hosted engineering control plane for coding agents
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.version=${{ steps.version.outputs.value }}
            org.opencontainers.image.licenses=Apache-2.0

  package:
    name: Publish multi-architecture package
    needs: package-build
    runs-on: ubuntu-latest
    steps:
      - name: Resolve version
        id: version
        shell: bash
        run: echo "value=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4
      - uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}
      - name: Publish atomic multi-architecture manifest
        run: |
          docker buildx imagetools create \
            --tag "ghcr.io/${GITHUB_REPOSITORY}:${{ steps.version.outputs.value }}" \
            --tag "ghcr.io/${GITHUB_REPOSITORY}:latest" \
            "ghcr.io/${GITHUB_REPOSITORY}:${{ steps.version.outputs.value }}-amd64" \
            "ghcr.io/${GITHUB_REPOSITORY}:${{ steps.version.outputs.value }}-arm64"
          docker buildx imagetools inspect "ghcr.io/${GITHUB_REPOSITORY}:${{ steps.version.outputs.value }}" \
            | tee /tmp/package-inspect.txt
          grep -F 'linux/amd64' /tmp/package-inspect.txt
          grep -F 'linux/arm64' /tmp/package-inspect.txt
      - name: Verify package is anonymously pullable
        run: |
          for attempt in $(seq 1 12); do
            token="$(curl -fsS --get \
              --data-urlencode "scope=repository:${GITHUB_REPOSITORY}:pull" \
              https://ghcr.io/token | jq -r '.token // empty')"
            if [ -n "$token" ] && curl -fsSI \
              -H "Authorization: Bearer $token" \
              -H 'Accept: application/vnd.oci.image.index.v1+json' \
              "https://ghcr.io/v2/${GITHUB_REPOSITORY}/manifests/${{ steps.version.outputs.value }}"; then
              exit 0
            fi
            sleep 5
          done
          exit 1

  release:
    name: Publish verified release
    needs:
      - package
      - release-assets
    runs-on: ubuntu-latest
    steps:
      - name: Publish GitHub release after package verification
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release edit "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" --draft=false --verify-tag
